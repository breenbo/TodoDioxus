[package]
name = "web"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["router", "fullstack"] }
ui = { workspace = true, optional = true }
api = { workspace = true }

[features]
default = []
web = ["dioxus/web", "dep:ui"]
server = ["dioxus/server", "ui/server"]
