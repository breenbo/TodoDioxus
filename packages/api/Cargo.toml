[package]
name = "api"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["fullstack"] }
tokio = { workspace = true, features = ["full"] }
sqlx = { workspace = true, features = [
  "sqlite",
  "runtime-tokio",
  "tls-native-tls",
] }
serde = { workspace = true }

[features]
server = ["dioxus/server"]
