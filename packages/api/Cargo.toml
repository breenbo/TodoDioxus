[package]
name = "api"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["fullstack"] }
serde = { workspace = true, features = ["derive"] }
sqlx = { workspace = true, features = [
  "sqlite",
  "runtime-tokio",
  "tls-native-tls",
], optional = true }
tokio = { workspace = true, features = ["full"], optional = true }

[features]
server = ["dioxus/server", "dep:sqlx", "dep:tokio"]
